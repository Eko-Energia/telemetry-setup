name: perla-telemetry-stack
services:

  watchtower:
    image: containrrr/watchtower
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=21600
      - DOCKER_API_VERSION=1.54
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./config:/mosquitto/config
      - ./mq-data:/mosquitto/data
      - ./mq-log:/mosquitto/log

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: victoriametrics
    restart: unless-stopped
    ports:
      - "8428:8428"
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retentionPeriod=100y"
    volumes:
      - ./vm-data:/victoria-metrics-data

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    restart: unless-stopped
    depends_on:
      - mosquitto
      - victoriametrics
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - ./telegraf/can_decode.star:/etc/telegraf/can_decode.star:ro

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - victoriametrics
    ports:
      - "3000:3000"
    environment:
      # Pit-wall monitors can view dashboards without logging in (read-only).
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      # Grafana runs as uid 472 - a bind-mount would be root-owned and unwritable,
      # so its data lives in a named volume (Docker handles ownership).
      - grafana-data:/var/lib/grafana
      # Provisioning is read-only config (tracked in git) - auto-adds the VM datasource.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  grafana-data: